<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial News Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass-card border-b border-gray-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-500/30">
                        N
                    </div>
                    <span class="font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-300">
                        Financial News Intelligence
                    </span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    <span class="text-xs font-semibold uppercase tracking-wider text-emerald-400">Live Crawl Active</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Real-Time News Stream</h1>
                <p class="text-gray-400">Auto-crawled from CafeF, Vietstock, and VnEconomy every 3 minutes.</p>
            </div>
            <div class="text-sm font-medium text-gray-500 bg-gray-800/50 px-4 py-2 rounded-full border border-gray-700/50">
                Auto-updating...
            </div>
        </div>

        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Articles will be injected here via JS -->
            <div class="col-span-full flex justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500"></div>
            </div>
        </div>
    </main>

    <script>
        function getSentimentColor(sentiment) {
            const s = sentiment.toLowerCase();
            if (s === 'positive' || s === 'good') return 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
            if (s === 'negative' || s === 'bad') return 'bg-rose-500/10 text-rose-400 border border-rose-500/20';
            return 'bg-gray-500/10 text-gray-300 border border-gray-500/20';
        }

        function createCard(article) {
            const sentimentBadge = `<span class="px-2.5 py-1 rounded-md text-xs font-semibold uppercase tracking-wider ${getSentimentColor(article.sentiment)}">${article.sentiment}</span>`;
            
            const stockBadges = article.stocks.length > 0 
                ? article.stocks.map(stock => `<span class="px-2.5 py-1 rounded-md text-xs font-bold text-blue-300 bg-blue-900/30 border border-blue-800/50 hover:bg-blue-800/40 transition-colors shadow-[0_0_10px_rgba(59,130,246,0.1)] glow cursor-pointer">${stock}</span>`).join('')
                : '';
                
            const badgesHtml = `<div class="flex flex-wrap gap-2 mb-4">${sentimentBadge}${stockBadges}</div>`;
            
            const dateStr = article.published ? new Date(article.published).toLocaleString() : 'Recent';
            
            // Clean up source URL to display domain name
            const sourceUrl = article.source || '';
            const domain = sourceUrl.replace('https://', '').replace('.rss', '').split('/')[0] || 'News Source';

            return `
                <div class="glass-card rounded-2xl p-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-indigo-500/10 hover:border-gray-700 group fade-in flex flex-col h-full">
                    ${badgesHtml}
                    
                    <a href="${article.link}" target="_blank" class="block group-hover:text-indigo-400 transition-colors">
                        <h2 class="text-lg font-bold text-white mb-3 line-clamp-3 leading-snug">${article.title}</h2>
                    </a>
                    
                    <div class="flex-grow">
                        <div class="relative pl-4 border-l-2 border-indigo-500/50 bg-indigo-500/5 p-3 rounded-r-lg mb-4">
                            <h3 class="text-xs font-bold uppercase tracking-wider text-indigo-400 mb-1 flex items-center">
                                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                AI Summary
                            </h3>
                            <p class="text-sm text-gray-300 leading-relaxed line-clamp-4">
                                ${article.nlp_summary || 'No summary generated yet.'}
                            </p>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-800">
                        <span class="text-xs font-medium text-gray-500 flex items-center">
                            <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                            ${domain}
                        </span>
                        <span class="text-xs text-gray-500">${dateStr}</span>
                    </div>
                </div>
            `;
        }

        async function fetchArticles() {
            try {
                const response = await fetch('/api/v1/articles');
                const articles = await response.json();
                
                const container = document.getElementById('articles-container');
                if (articles.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-500">
                            <svg class="w-16 h-16 mb-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                            <p class="text-lg font-medium">No articles parsed yet.</p>
                            <p class="text-sm">The background crawler will populate this shortly...</p>
                        </div>
                    `;
                    return;
                }
                
                // Construct new HTML
                let newHtml = '';
                articles.forEach(article => {
                    newHtml += createCard(article);
                });
                
                // Only update DOM if content actually changed to prevent flashing
                if (container.dataset.contentHash !== String(articles[0]?.id)) {
                    container.innerHTML = newHtml;
                    container.dataset.contentHash = articles[0]?.id; // simple hash technique using latest ID
                }
            } catch (error) {
                console.error("Error fetching articles:", error);
            }
        }

        // Initial fetch
        fetchArticles();
        
        // Poll every 5 seconds
        setInterval(fetchArticles, 5000);
    </script>
</body>
</html>
